services:
  database:
      image: postgres:latest
      container_name: app_db_1
      environment:
        - POSTGRES_USER=postgres
        - POSTGRES_PASSWORD=postgres
        - POSTGRES_DB=CurrencyConverterDb
      ports:
        - 5432:5433
      restart: always

  currencyconverterapi:
    image: ${DOCKER_REGISTRY-}currencyconverterapi
    build:
      context: .
      dockerfile: CurrencyConverterApi/Dockerfile
    depends_on:
        - "database"
    ports:
        - 8080:8080
        - 8081:8081
    environment: 
         - ConnectionStrings:DefaultConnection=Host=database;Database=CurrencyConverterDb;Username=postgres;Password=postgres;
